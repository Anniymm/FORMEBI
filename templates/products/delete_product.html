<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Product</title>
</head>

<body style="font-family: Arial; background:#f4f6f9; padding:40px; text-align:center;">

<h2 style="color:#333;">Delete Product</h2>

<p style="font-size:18px;">
Are you sure you want to delete this product?
</p>

<div style="background:white; padding:20px; max-width:400px; margin:20px auto; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1);">

<p><strong>Price:</strong> ${{ product.price }}</p>

{% if product.in_stock %}
<span style="color:green;">In stock</span>
{% else %}
<span style="color:red;">Not in stock</span>
{% endif %}

</div>

<form method="POST">
    {% csrf_token %}
    
    <button type="submit" 
    style="background:#e74c3c; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">
        Delete
    </button>

    <a href="{% url 'product_list' %}" 
    style="margin-left:10px; padding:10px 20px; background:#3498db; color:white; text-decoration:none; border-radius:5px;">
        Cancel
    </a>

</form>

</body>
</html>
